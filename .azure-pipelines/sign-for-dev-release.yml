name: $(Date:yyyyMMdd).$(Rev:r)
variables:
  - name: Codeql.Enabled
    value: true
resources:
  repositories:
    - repository: self
      type: git
      ref: refs/heads/wangmi/1es
    - repository: 1esPipelines
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release
trigger: none
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: 1ES_JavaTooling_Pool
      image: 1ES_JavaTooling_Ubuntu-2004
      os: linux
      timeoutInMinutes: 360
    sdl:
      sourceAnalysisPool:
        name: 1ES_JavaTooling_Pool
        image: 1ES_JavaTooling_Windows_2022
        os: windows
    customBuildTags:
      - MigrationTooling-mseng-VSJava-11383-Tool
    stages:
      - stage: Stage
        jobs:
          - job: Job_1
            displayName: Build and Sign Azure Plugin for IntelliJ
            timeoutInMinutes: 360
            templateContext:
              outputs:
                - output: pipelineArtifact
                  artifactName: drop
                  targetPath: $(build.artifactstagingdirectory)
                  displayName: "Publish Artifact: drop"
            steps:
              - checkout: self
                fetchTags: false
              - task: Bash@3
                displayName: Prepare JDK environment
                inputs:
                  targetType: inline
                  script: |
                    # Create a directory for the JDK
                    mkdir -p $HOME/java
                    cd $HOME/java

                    # Download Adoptium/Temurin JDK 17.0.7
                    echo "Downloading Java 17.0.7..."
                    wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.7%2B7/OpenJDK17U-jdk_x64_linux_hotspot_17.0.7_7.tar.gz

                    # Extract the archive
                    echo "Extracting Java 17.0.7..."
                    tar -xzf OpenJDK17U-jdk_x64_linux_hotspot_17.0.7_7.tar.gz
                    rm OpenJDK17U-jdk_x64_linux_hotspot_17.0.7_7.tar.gz

                    # Set JAVA_HOME and add to PATH
                    export JAVA_HOME=$HOME/java/jdk-17.0.7+7
                    export PATH=$JAVA_HOME/bin:$PATH

                    echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_HOME"
                    echo "##vso[task.setvariable variable=PATH]$PATH"
              - task: Bash@3
                displayName: Build Toolkit Libs@$(TOOLKIT_BRANCH)
                inputs:
                  targetType: inline
                  script: |-
                    TARGET_BRANCH=$(TOOLKIT_BRANCH)

                    ls ~/.m2/repository/com/microsoft/azure/azure-toolkit-*
                    cd ..
                    git clone https://github.com/microsoft/azure-maven-plugins.git
                    cd azure-maven-plugins/azure-toolkit-libs

                    echo "build azure-toolkit-libs: $TARGET_BRANCH"
                    git fetch origin $TARGET_BRANCH
                    git checkout $TARGET_BRANCH

                    git branch
                    mvn clean install -T 4 -Dmaven.test.skip=true -Dmdep.analyze.skip=true -Dmaven.source.skip=true -Dmaven.javadoc.skip=true -Dcheckstyle.skip -B|| exit -1

                    ls ~/.m2/repository/com/microsoft/azure/azure-toolkit-*
                    echo "cleaning up battlefield."
                    cd ../../
                    rm -rf ./azure-maven-plugins
                    exit 0
              - task: Bash@3
                displayName: Build Utils
                inputs:
                  targetType: inline
                  script: |-
                    mvn -v
                    # ./gradlew buildUtils || exit -1
                    mvn clean install -f ./Utils/pom.xml -T 1C -Dcheckstyle.skip=true -Dmaven.test.skip=true -Dmaven.javadoc.skip=true
                    mvn clean -f ./Utils/pom.xml
              - task: Bash@3
                displayName: Build Plugin
                inputs:
                  targetType: inline
                  script: |
                    (cd PluginsAndFeatures/azure-toolkit-for-intellij && ./gradlew clean buildPlugin -s -Papplicationinsights.key=$(INTELLIJ_KEY) -PneedPatchVersion=true -Psources=false -Porg.gradle.configureondemand=false -Porg.gradle.daemon=false -Porg.gradle.unsafe.configuration-cache=false -Porg.gradle.caching=false)

                    mkdir -p ./artifacts/intellij/
                    cp ./PluginsAndFeatures/azure-toolkit-for-intellij/build/distributions/*.zip ./artifacts/intellij/azure-toolkit-for-intellij.zip
                    unzip ./artifacts/intellij/azure-toolkit-for-intellij.zip -d ./artifacts/intellij/folder
                    rm  ./artifacts/intellij/azure-toolkit-for-intellij.zip
              - task: UsePythonVersion@0
                displayName: 'Use Python 3.11.x'
                inputs:
                  versionSpec: 3.11.x
              - task: UseDotNet@2
                displayName: 'Use .NET Core 3.1.x'
                inputs:
                  packageType: 'sdk'
                  version: '3.1.x'  
              - task: MicroBuildSigningPlugin@4
                displayName: 'Install Signing Plugin'
                inputs:
                  signType: real
                  azureSubscription: 'MicroBuild Signing Task (MSEng)'
                  feedSource: 'https://mseng.pkgs.visualstudio.com/DefaultCollection/_packaging/MicroBuildToolset/nuget/v3/index.json'
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)  
              - task: CmdLine@2
                displayName: Sign jars
                timeoutInMinutes: 240
                inputs:
                  script: |
                    ABSOLUTE_PATH="$(pwd)"
                    # Generate the signing-filelist.xml file
                    echo '<?xml version="1.0" encoding="utf-8" ?>' > signing-filelist.xml
                    echo '<filelist>' >> signing-filelist.xml
                    echo '    <certificate certnumbers="100010171">' >> signing-filelist.xml

                    find . -type f -name "azure-intellij-*.jar" -o -name "azure-toolkit-*.jar" -o -name "azuretools-core-*.jar" -o -name "azure-explorer-common-*.jar" -o -name "hdinsight-node-common-*.jar" -o -name "azure-sdk-reference-book.jar" | while read -r file; do
                        clean_file="${file#./}"
                        abs_path="$ABSOLUTE_PATH/$clean_file"
                        echo "        <file srcpath=\"$abs_path\" dstpath=\"$abs_path\"></file>" >> signing-filelist.xml
                    done

                    echo '    </certificate>' >> signing-filelist.xml
                    echo '</filelist>' >> signing-filelist.xml

                    dotnet "$MBSIGN_APPFOLDER/DDSignFiles.dll" -- /filelist:signing-filelist.xml
                    rm signing-filelist.xml
                  workingDirectory: 'artifacts/intellij/folder/azure-toolkit-for-intellij/lib'    
              - task: Bash@3
                displayName: Repackage
                inputs:
                  targetType: inline
                  script: |
                    # Write your commands here
                    (cd ./artifacts/intellij/folder && zip -r ../../azure-toolkit-for-intellij-$(Build.BuildNumber).zip ./azure-toolkit-for-intellij/)
              - task: CopyFiles@2
                displayName: "Copy Files to: $(build.artifactstagingdirectory)"
                inputs:
                  SourceFolder: $(system.defaultworkingdirectory)/artifacts
                  Contents: "*.zip"
                  TargetFolder: $(build.artifactstagingdirectory)
              - task: AzureArtifacts.manifest-generator-task.manifest-generator-task.ManifestGeneratorTask@0
                displayName: "Manifest Generator "
                inputs:
                  BuildDropPath: $(build.artifactstagingdirectory)
